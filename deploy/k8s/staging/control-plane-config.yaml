apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-config
  namespace: control-plane
data:
  APP_ENV: "staging"
  LOG_LEVEL: "INFO"
  MODEL_CLIENT_MODE: "fake"
---
apiVersion: v1
kind: Secret
metadata:
  name: control-plane-secrets
  namespace: control-plane
type: Opaque
stringData:
  DATABASE_URL: "postgresql://staging_user:staging_pass@postgres.staging.svc.cluster.local:5432/agent_failure"
  OPENROUTER_API_KEY: "replace-me"
