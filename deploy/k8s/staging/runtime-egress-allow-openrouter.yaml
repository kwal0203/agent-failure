apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: runtime-egress-allow-openrouter
  namespace: runtime-pool
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: lab-runtime
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: openrouter.ai
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
