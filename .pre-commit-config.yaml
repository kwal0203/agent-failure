repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: [ --allow-multiple-documents ]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-check
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        exclude: (^|/)(package-lock\.json|pnpm-lock\.yaml|yarn\.lock)$

  - repo: local
    hooks:
      - id: local-biome-check
        name: biome check
        entry: bash -lc 'cd apps/frontend && npx biome check --write --files-ignore-unknown=true .'
        language: system
        pass_filenames: false
        files: ^apps/frontend/

      - id: pytest
        name: pytest
        entry: bash -lc 'uv run python -m pytest -q -m "not integration"; rc=$?; [ "$rc" -eq 5 ] && exit 0 || exit "$rc"'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: web-typecheck
        name: web typecheck
        entry: bash -lc 'cd apps/frontend && npm run typecheck'
        language: system
        pass_filenames: false
        stages: [pre-commit]
